<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Soluciones TIC & Seguridad | Infraestructura y Ciberseguridad</title>

    <meta name="description"
        content="Soluciones TIC, infraestructura IT y ciberseguridad para empresas. Redes, cloud, sistemas y protección avanzada.">
    <meta name="keywords" content="servicios IT, ciberseguridad, infraestructura, redes, cloud, sistemas">
    <meta name="author" content="Soluciones TIC & Seguridad">

    <meta property="og:title" content="Soluciones TIC & Seguridad">
    <meta property="og:description" content="Infraestructura IT y ciberseguridad empresarial">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_ES">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px rgba(44, 70, 130, 0.18);
        }

        /* ANIMACIÓN SCROLL INDICATOR */
        @keyframes bounce-slow {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            50% {
                transform: translateY(10px);
                opacity: 1;
            }
        }

        .animate-bounce-slow {
            animation: bounce-slow 2s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        html,
        body {
            min-height: 100%;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #247ba0 0%, #1b4f72 100%);
            z-index: -3;
            pointer-events: none;
        }

        #network-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            display: block;
        }

        main {
            position: relative;
            z-index: 10;
        }

        html,
        body {
            background: transparent !important;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#126b97] to-[#3bc6e7] relative overflow-x-hidden px-4 text-white">

    <canvas id="network-bg" aria-hidden="true"></canvas>

    <main class="relative z-10 max-w-[1100px] mx-auto space-y-10 py-10">

        <section class="glass-card rounded-[32px] px-8 py-10 md:px-12 md:py-12">

            <div class="grid lg:grid-cols-2 gap-10 items-center">
                <div class="flex flex-col justify-center">
                    <span
                        class="inline-block w-fit mb-6 px-6 py-2.5 text-sm font-bold bg-blue-50 text-blue-600 rounded-full">
                        Servicios IT Profesionales
                    </span>

                    <h1 class="text-4xl sm:text-5xl xl:text-6xl font-black leading-tight text-white my-6">
                        Soluciones TIC<br>para empresas
                    </h1>

                    <p class="text-lg text-sky-100 max-w-xl leading-relaxed">
                        Diseñamos, protegemos y optimizamos infraestructuras tecnológicas modernas
                        para garantizar continuidad, seguridad y crecimiento.
                    </p>
                </div>

                <div class="flex items-center justify-center lg:justify-end h-full">
                    <div id="lottie-animation" class="w-full max-w-[450px] aspect-square lg:h-auto"></div>
                </div>
            </div>
            <div class="mt-6 flex flex-col items-center gap-2 animate-bounce-slow opacity-80">
                <span class="text-[10px] uppercase tracking-[0.3em] font-bold text-sky-200">Explorar servicios</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
                </svg>
            </div>

        </section>

    </main>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
    (function () {
        if (window.lottie) {
            const lottieContainer = document.getElementById('lottie-animation');
            if (lottieContainer) {
                lottie.loadAnimation({
                    container: lottieContainer,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true,
                    path: 'https://lottie.host/403ec8a2-128c-4913-a82d-4d8afa8c06a3/KT3lgBmLHA.json'
                });
            }
        }

        if (window.skynetNetworkBgInit) return;
        window.skynetNetworkBgInit = true;

        let canvas = document.getElementById('network-bg');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'network-bg';
            canvas.setAttribute('aria-hidden', 'true');
            document.body.appendChild(canvas);
        }

        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let width = 0;
        let height = 0;
        let rafId = null;
        let nodes = [];

        function createNodes(count) {
            nodes = [];
            for (let i = 0; i < count; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.45,
                    vy: (Math.random() - 0.5) * 0.45
                });
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createNodes(Math.floor((width * height) / 10000));
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];

                ctx.beginPath();
                ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < nodes.length; j++) {
                    const n2 = nodes[j];
                    const dx = n.x - n2.x;
                    const dy = n.y - n2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(n2.x, n2.y);
                        ctx.stroke();
                    }
                }

                n.x += n.vx;
                n.y += n.vy;

                if (n.x < 0 || n.x > width) n.vx *= -1;
                if (n.y < 0 || n.y > height) n.vy *= -1;
            }

            rafId = window.requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize, { passive: true });
        resize();
        draw();

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                if (rafId) window.cancelAnimationFrame(rafId);
                rafId = null;
                return;
            }
            if (!rafId) draw();
        });
    })();
</script>

</html>
