    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            background: transparent;
        }

        body {
            position: relative;
            overflow-x: hidden;
            padding: 0;
            color: #fff;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #247ba0 0%, #1b4f72 100%);
            z-index: -3;
            pointer-events: none;
        }

        #network-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            display: block;
        }

        /* ── Layout ── */
        .page-main {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            margin: 0px auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            padding: 2.5rem 1rem;
            min-height: calc(100vh - 560px);
        }

        /* ── Card ── */
        .glass-card {
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px rgba(44, 70, 130, 0.18);
        }

        .main-card {
            border-radius: 32px;
            padding: 2.5rem 2rem;
        }

        @media (min-width: 768px) {
            .main-card {
                padding: 3rem;
            }
        }

        /* ── Hero grid ── */
        .hero-grid {
            display: grid;
            gap: 2.5rem;
            align-items: center;
        }

        @media (min-width: 1024px) {
            .hero-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .hero-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ── Badge ── */
        .service-badge {
            display: inline-block;
            width: fit-content;
            margin-bottom: 1.5rem;
            padding: 0.625rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 700;
            background: #eff6ff;
            color: #2563eb;
            border-radius: 9999px;
        }

        /* ── Heading ── */
        .hero-title {
            font-size: clamp(2.25rem, 5vw, 3.75rem);
            font-weight: 900;
            line-height: 1.15;
            color: #fff;
            margin: 1.5rem 0;
        }

        /* ── Description ── */
        .hero-desc {
            font-size: 1.125rem;
            color: rgba(224, 242, 254, 0.9);
            max-width: 36rem;
            line-height: 1.625;
            margin: 0;
        }

        /* ── Lottie ── */
        .lottie-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        @media (min-width: 1024px) {
            .lottie-wrap {
                justify-content: flex-end;
            }
        }

        #lottie-animation {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1;
        }

        /* ── Scroll hint ── */
        .scroll-hint {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            opacity: 0.8;
        }

        .scroll-hint-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 700;
            color: #bae6fd;
        }

        /* ── Animations ── */
        @keyframes bounce-slow {

            0%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            50% {
                transform: translateY(10px);
                opacity: 1;
            }
        }

        .scroll-hint {
            animation: bounce-slow 2s infinite ease-in-out;
        }
    </style>
</head>

<body>

    <canvas id="network-bg" aria-hidden="true"></canvas>

    <main class="page-main">

        <section class="glass-card main-card">

            <div class="hero-grid">
                <div class="hero-text">
                    <span class="service-badge">Servicios IT Profesionales</span>

                    <h1 class="hero-title">
                        Soluciones TIC<br>para empresas
                    </h1>

                    <p class="hero-desc">
                        Diseñamos, protegemos y optimizamos infraestructuras tecnológicas modernas
                        para garantizar continuidad, seguridad y crecimiento.
                    </p>
                </div>

                <div class="lottie-wrap">
                    <div id="lottie-animation"></div>
                </div>
            </div>

            <div class="scroll-hint" aria-hidden="true">
                <span class="scroll-hint-label">Explorar servicios</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 13l5 5 5-5M7 6l5 5 5-5" />
                </svg>
            </div>

        </section>

    </main>
</body>

<script>
    (function () {
        // Cargar lottie_light (SVG-only, ~40% más ligero) tras window.load
        // para no competir con recursos LCP
        var lottieContainer = document.getElementById('lottie-animation');
        if (lottieContainer) {
            function loadLottieLight() {
                if (window.__skyLottieLoaded) return;
                window.__skyLottieLoaded = true;
                var s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie_light.min.js';
                s.onload = function () {
                    window.lottie.loadAnimation({
                        container: lottieContainer,
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        path: 'https://skynet-sys.es/wp-content/uploads/2026/04/ServiciosIt.json'
                    });
                };
                document.head.appendChild(s);
            }
            if (document.readyState !== 'loading') {
                loadLottieLight();
            } else {
                document.addEventListener('DOMContentLoaded', loadLottieLight, { once: true });
            }
        }

        if (window.skynetNetworkBgInit) return;
        window.skynetNetworkBgInit = true;

        let canvas = document.getElementById('network-bg');
        if (!canvas) {
            canvas = document.createElement('canvas');
            canvas.id = 'network-bg';
            canvas.setAttribute('aria-hidden', 'true');
            document.body.appendChild(canvas);
        }

        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let width = 0;
        let height = 0;
        let rafId = null;
        let nodes = [];

        function createNodes(count) {
            nodes = [];
            for (let i = 0; i < count; i++) {
                nodes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.45,
                    vy: (Math.random() - 0.5) * 0.45
                });
            }
        }

        var resizeTimer = null;
        function nodeCount() {
            return width < 768
                ? Math.floor((width * height) / 18000)
                : Math.floor((width * height) / 10000);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createNodes(nodeCount());
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;

            for (let i = 0; i < nodes.length; i++) {
                const n = nodes[i];

                ctx.beginPath();
                ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < nodes.length; j++) {
                    const n2 = nodes[j];
                    const dx = n.x - n2.x;
                    const dy = n.y - n2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(n.x, n.y);
                        ctx.lineTo(n2.x, n2.y);
                        ctx.stroke();
                    }
                }

                n.x += n.vx;
                n.y += n.vy;

                if (n.x < 0 || n.x > width) n.vx *= -1;
                if (n.y < 0 || n.y > height) n.vy *= -1;
            }

            rafId = window.requestAnimationFrame(draw);
        }

        window.addEventListener('resize', function () {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resize, 150);
        }, { passive: true });
        resize();
        draw();

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                if (rafId) window.cancelAnimationFrame(rafId);
                rafId = null;
                return;
            }
            if (!rafId) draw();
        });
    })();
</script>
