    <script>
        /* ── Skynet Drawer v3 — delegación desde document, inmune a Blocksy ── */
        (function skyDrawerInit() {

            function init() {
                var hamburger = document.querySelector(".sky-hamburger");
                var overlay = document.getElementById("sky-overlay");
                var drawer = document.getElementById("sky-drawer");

                if (!hamburger || !overlay || !drawer) {
                    console.error("SkyDrawer: NO se encontraron los elementos.",
                        "drawer:", !!document.getElementById("sky-drawer"),
                        "overlay:", !!document.getElementById("sky-overlay"),
                        "hamburger:", !!document.querySelector(".sky-hamburger")
                    );
                    return;
                }

                console.log("SkyDrawer: inicializado correctamente ✓");

                /* Mover al body para escapar de cualquier contenedor Blocksy */
                document.body.appendChild(overlay);
                document.body.appendChild(drawer);

                function openMenu() {
                    drawer.classList.remove("closing");
                    drawer.classList.add("open");
                    overlay.classList.add("open");
                    hamburger.classList.add("open");
                    hamburger.setAttribute("aria-expanded", "true");
                    document.body.classList.add("sky-menu-open");
                }

                function closeMenu() {
                    if (!drawer.classList.contains("open")) return;
                    drawer.classList.add("closing");
                    overlay.classList.remove("open");
                    hamburger.classList.remove("open");
                    hamburger.setAttribute("aria-expanded", "false");
                    document.body.classList.remove("sky-menu-open");
                    drawer.addEventListener("animationend", function h() {
                        drawer.classList.remove("open", "closing");
                        drawer.removeEventListener("animationend", h);
                    });
                }

                /* DELEGACION DESDE document en fase CAPTURA: imposible de bloquear por Blocksy */
                document.addEventListener("click", function (e) {

                    if (e.target.closest(".sky-hamburger")) {
                        e.preventDefault();
                        drawer.classList.contains("open") ? closeMenu() : openMenu();
                        return;
                    }

                    if (e.target.closest("#sky-drawer-close")) {
                        closeMenu();
                        return;
                    }

                    if (e.target.closest(".sky-drawer-nav a")) {
                        closeMenu();
                        return;
                    }

                    if (e.target === overlay) {
                        closeMenu();
                        return;
                    }

                }, true); /* true = fase de CAPTURA, va antes que cualquier listener de Blocksy */

                document.addEventListener("keydown", function (e) {
                    if (e.key === "Escape") closeMenu();
                });

                /* active link */
                var currentPath = window.location.pathname.replace(/\/$/, "");
                document.querySelectorAll(".nav-links a, .sky-drawer-nav a, .topbar-left a").forEach(function (link) {
                    var lp = (link.getAttribute("href") || "").replace(/\/$/, "");
                    if (lp === currentPath || (lp === "/" && currentPath === "")) link.classList.add("active");
                });

                /* scroll / pastilla flotante */
                var headerWrap = document.querySelector(".header-wrapper");
                var spacing = document.querySelector(".header-spacing");
                var ENTER_Y = 26, EXIT_Y = 8, ENTER_MS = 420, LEAVE_MS = 260;
                var isScrolled = false, enterTimer, leaveTimer, raf;

                function setSpacing(h) {
                    if (!spacing) return;
                    if (raf) cancelAnimationFrame(raf);
                    raf = requestAnimationFrame(function () { spacing.style.height = h; });
                }

                function onScroll() {
                    var y = window.scrollY || 0;
                    if (!isScrolled && y > ENTER_Y) {
                        isScrolled = true;
                        headerWrap.classList.remove("is-leaving");
                        headerWrap.classList.add("is-scrolled", "is-entering");
                        clearTimeout(enterTimer);
                        enterTimer = setTimeout(function () { headerWrap.classList.remove("is-entering"); }, ENTER_MS);
                        setSpacing("76px");
                    } else if (isScrolled && y < EXIT_Y) {
                        isScrolled = false;
                        headerWrap.classList.remove("is-entering", "is-scrolled");
                        headerWrap.classList.add("is-leaving");
                        clearTimeout(leaveTimer);
                        leaveTimer = setTimeout(function () { headerWrap.classList.remove("is-leaving"); }, LEAVE_MS);
                        setSpacing("112px");
                    }
                }

                onScroll();
                window.addEventListener("scroll", onScroll, { passive: true });
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", init);
            } else {
                init();
            }

        })();
    </script>
</p>
