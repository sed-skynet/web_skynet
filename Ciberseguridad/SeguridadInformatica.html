<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciberseguridad | Skynet Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <style>
        :root {
            --max: 1100px;
            --text-dim: rgba(255, 255, 255, .86);
            --glass: rgba(255, 255, 255, .18);
            font-family: "Inter", system-ui, sans-serif;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: transparent !important;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, #247ba0 0%, #1b4f72 100%);
            z-index: -3;
            pointer-events: none;
        }

        #network-bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            display: block;
        }

        .wrap {
            max-width: var(--max);
            margin: 28px auto 32px;
            padding: 0 16px;
            position: relative;
            z-index: 2;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, .25);
            border-radius: 30px;
            box-shadow: 0 20px 56px rgba(9, 45, 75, .22);
            overflow: hidden;
        }

        .section-a {
            padding: 34px 30px 20px;
            min-height: 540px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 40%);
            align-items: center;
            gap: 30px;
            max-width: 980px;
            width: 100%;
            margin: 34px auto 0;
        }

        .hero-copy {
            max-width: 600px;
        }

        .tag {
            display: inline-block;
            background: #eaf3ff;
            border: 1px solid rgba(255, 255, 255, .45);
            color: #2563eb;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .section-a h1 {
            margin: 0;
            color: #fff;
            font-weight: 900;
            font-size: clamp(2.6rem, 5vw, 4.5rem);
            line-height: 1.08;
            letter-spacing: -.5px;
        }

        .hero-copy p {
            margin: 18px 0 0;
            color: var(--text-dim);
            font-size: clamp(1rem, 1.4vw, 1.5rem);
            max-width: 500px;
            line-height: 1.5;
        }

        #lottie-animation {
            width: 100%;
            max-width: 400px;
            height: 280px;
            transform: translateX(-18px);
        }

        .hero-indicator {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            opacity: .82;
            color: #cdefff;
        }

        .hero-indicator span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .3em;
            font-weight: 700;
        }

        @keyframes hero-bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(7px);
            }
        }

        .hero-indicator svg {
            animation: hero-bounce 2s infinite ease-in-out;
        }

        @media (max-width: 860px) {
            .section-a {
                min-height: auto;
                padding: 28px 20px 18px;
            }

            .hero-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                margin-top: 18px;
                text-align: center;
            }

            .hero-copy {
                max-width: 100%;
            }

            .hero-copy p {
                max-width: none;
            }

            #lottie-animation {
                margin: 0 auto;
                transform: none;
                height: 240px;
            }
        }
    </style>
</head>

<body>
    <canvas id="network-bg" aria-hidden="true"></canvas>

    <div class="wrap">
        <section class="glass-card section-a" aria-label="Introducción a ciberseguridad">
            <div class="hero-grid">
                <div class="hero-copy">
                    <span class="tag">Ciberseguridad</span>
                    <h1>Seguridad Informática</h1>
                    <p>
                        Seguridad personalizada para tu empresa, pensada para proteger tus datos en todo momento.
                    </p>
                </div>
                <div id="lottie-animation" aria-hidden="true"></div>
            </div>

            <div class="hero-indicator" aria-hidden="true">
                <span>Scroll</span>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5V19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    <path d="M6 13L12 19L18 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </section>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById("network-bg");
            const ctx = canvas.getContext("2d");
            let w = 0;
            let h = 0;
            let points = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                points = Array.from({ length: Math.floor((w * h) / 10000) }, () => ({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.45,
                    vy: (Math.random() - 0.5) * 0.45
                }));
            }

            function draw() {
                ctx.clearRect(0, 0, w, h);

                for (const p of points) {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > w) p.vx *= -1;
                    if (p.y < 0 || p.y > h) p.vy *= -1;
                }

                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const a = points[i];
                        const b = points[j];
                        const dx = a.x - b.x;
                        const dy = a.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            const alpha = 1 - dist / 120;
                            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.1})`;
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.stroke();
                        }
                    }
                }

                for (const p of points) {
                    ctx.fillStyle = "#ffffff";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                requestAnimationFrame(draw);
            }

            resize();
            draw();
            window.addEventListener("resize", resize);
        })();

        if (window.lottie) {
            window.lottie.loadAnimation({
                container: document.getElementById("lottie-animation"),
                renderer: "svg",
                loop: true,
                autoplay: true,
                path: 'https://lottie.host/9732053b-6258-4213-8c11-22540d94ea30/WYHDfvwhqc.json'
            });
        }
    </script>
</body>

</html>
