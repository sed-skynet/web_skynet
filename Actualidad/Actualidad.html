<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualidad al Día - Noticias</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #2b90e3;
            --accent-dark: #1a6bb8;
            --accent-light: #3bc6e7;
            --dark-blue: #18476b;
            --container: 1400px;
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: auto;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #247ba0 0%, #1b4f72 100%);
            z-index: -2;
        }

        /* Página aislada */
        .news-page {
            min-height: 100vh;
            background: transparent;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        .container {
            width: min(var(--container), calc(100% - 48px));
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Grid Principal */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        @media (max-width: 1100px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .news-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* Tarjetas de Noticias */
        .news-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, .08) 0%, rgba(255, 255, 255, .03) 100%);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .2);
            transition: all .4s cubic-bezier(.4, 0, .2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            /* Para que todas tengan la misma altura */
        }

        .news-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, .4);
            background: linear-gradient(135deg, rgba(255, 255, 255, .12) 0%, rgba(255, 255, 255, .05) 100%);
            border-color: rgba(255, 255, 255, .2);
        }

        .news-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: linear-gradient(135deg, rgba(43, 144, 227, .3), rgba(59, 198, 231, .3));
        }

        .news-content {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-meta {
            margin-bottom: auto;
        }

        .category-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            width: fit-content;
        }

        /* Colores de categorías */
        .category-badge.actualidad,
        .u-badge[data-cat="Actualidad"] {
            background: rgba(59, 130, 246, .15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, .3);
        }

        .category-badge.casos-exito,
        .u-badge[data-cat="Casos de Éxito"] {
            background: rgba(34, 197, 94, .15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, .3);
        }

        .category-badge.medios,
        .u-badge[data-cat="Medios de comunicación"] {
            background: rgba(168, 85, 247, .15);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, .3);
        }

        .category-badge.rgpd,
        .u-badge[data-cat="RGPD"] {
            background: rgba(239, 68, 68, .15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, .3);
        }

        .category-badge.rsc,
        .u-badge[data-cat="RSC"] {
            background: rgba(20, 184, 166, .15);
            color: #2dd4bf;
            border: 1px solid rgba(20, 184, 166, .3);
        }

        .category-badge.seguridad,
        .u-badge[data-cat="Seguridad Informática"] {
            background: rgba(249, 115, 22, .15);
            color: #fb923c;
            border: 1px solid rgba(249, 115, 22, .3);
        }

        .category-badge.servicios,
        .u-badge[data-cat="Servicios"] {
            background: rgba(99, 102, 241, .15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, .3);
        }

        .category-badge.servicios-web,
        .u-badge[data-cat="Servicios Web"] {
            background: rgba(236, 72, 153, .15);
            color: #f472b6;
            border: 1px solid rgba(236, 72, 153, .3);
        }

        .category-badge.soluciones-it,
        .u-badge[data-cat="Soluciones IT"] {
            background: rgba(234, 179, 8, .15);
            color: #facc15;
            border: 1px solid rgba(234, 179, 8, .3);
        }

        .news-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.4;
            color: #fff;
        }

        .news-description {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(224, 242, 255, .7);
            margin: 0 0 24px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            /* Limita el texto a 3 líneas */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .ai-summary-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .ai-summary-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .header-section {
            text-align: center;
            margin-bottom: 60px;
            padding-top: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        /* Resto de estilos del header y tabs... */
        .header-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-icon svg {
            width: 32px;
            height: 32px;
            stroke: var(--accent-light);
            fill: none;
            stroke-width: 2;
        }

        h1 {
            font-size: 64px;
            font-weight: 900;
            margin: 0 0 16px 0;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #ffffff 0%, #e0f2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 20px;
            color: rgba(224, 242, 255, 0.8);
        }

        .category-tabs {
            display: grid;
            grid-template-columns: repeat(5, auto);
            justify-content: center;
            gap: 10px;
            margin-bottom: 48px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 24px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @media (max-width: 1100px) {
            .category-tabs {
                grid-template-columns: repeat(4, auto);
            }
        }

        @media (max-width: 900px) {
            .category-tabs {
                grid-template-columns: repeat(3, auto);
            }
        }

        @media (max-width: 600px) {
            .category-tabs {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }

        .tab {
            padding: 12px 22px;
            border-radius: 11px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            white-space: nowrap;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(43, 144, 227, 0.4);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #network-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
            display: block;
        }

        /* ======================================
   BRIDGE DEFINITIVO SHORTCODE → DISEÑO
   ====================================== */

        /* El grid lo controlas tú */
        .news-from-shortcode .news-ultra-container {
            display: contents;
            /* hereda el grid padre */
        }

        /* =========================
   CARD REAL PARA SHORTCODE
   ========================= */
        .news-ultra-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, .08) 0%, rgba(255, 255, 255, .03) 100%);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, .2);
            transition: all .4s cubic-bezier(.4, 0, .2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .news-ultra-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, .4);
            background: linear-gradient(135deg, rgba(255, 255, 255, .12) 0%, rgba(255, 255, 255, .05) 100%);
            border-color: rgba(255, 255, 255, .2);
        }


        /* Imagen */
        .news-ultra-img {
            width: 100%;
            height: 217px !important;
            object-fit: cover;
            object-position: center top;
            /* 👈 CLAVE */
        }

        /* Contenido */
        .news-ultra-overlay {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Badge */
        .u-badge {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            width: fit-content;
            background: rgba(59, 130, 246, .15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, .3);
        }

        /* Título */
        .news-ultra-overlay h3 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.4;
            color: #fff;
        }

        /* Descripción */
        .news-ultra-overlay p {
            font-size: 15px;
            line-height: 1.6;
            color: rgba(224, 242, 255, .7);
            margin: 0 0 24px 0;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Botón IA / enlaces */
        .news-ultra-overlay a {
            margin-top: auto;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: .25s ease;
        }

        .news-ultra-overlay a:hover {
            background: rgba(255, 255, 255, .15);
            border-color: rgba(255, 255, 255, .3);
        }

        /* ===============================
   CATEGORY FILTER SMART
   =============================== */

        .category-filter {
            width: min(1200px, calc(100% - 48px));
            margin: 0 auto 48px;
            position: relative;
            z-index: 2;
        }

        .category-filter-toggle {
            display: none;
        }

        .category-tabs {
            display: grid;
            grid-template-columns: repeat(5, auto);
            justify-content: center;
            gap: 10px;
            padding: 0 24px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @media (max-width: 1100px) {
            .category-tabs {
                grid-template-columns: repeat(4, auto);
            }
        }

        @media (max-width: 900px) {
            .category-tabs {
                grid-template-columns: repeat(3, auto);
            }
        }

        /* ===== MÓVIL: botón + desplegable ===== */
        @media (max-width: 576px) {

            .category-filter {
                width: min(100%, calc(100% - 24px));
                margin: 0 auto 24px;
            }

            .category-filter-toggle {
                width: 75%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding: 12px 16px;
                border-radius: 14px;
                border: 1px solid rgba(255, 255, 255, .15);
                background: rgba(255, 255, 255, .08);
                color: #fff;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                backdrop-filter: blur(14px);
                box-shadow: 0 8px 24px rgba(0, 0, 0, .18);
                margin-left: 39px;
            }

            .filter-label {
                color: rgba(255, 255, 255, .68);
                font-weight: 500;
            }

            .filter-current {
                flex: 1;
                text-align: left;
                color: #fff;
                font-weight: 700;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .filter-arrow {
                transition: transform .25s ease;
            }

            .category-filter.open .filter-arrow {
                transform: rotate(180deg);
            }

            .category-tabs {
                display: none;
                margin-top: 10px;
                padding: 10px;
                grid-template-columns: 1fr;
                gap: 8px;
                background: rgba(10, 20, 40, .72);
                border: 1px solid rgba(255, 255, 255, .12);
                border-radius: 16px;
                backdrop-filter: blur(18px);
                box-shadow: 0 16px 40px rgba(0, 0, 0, .28);
            }

            .category-filter.open .category-tabs {
                display: grid;
            }

            .tab {
                width: 100%;
                padding: 12px 14px;
                font-size: 13px;
                border-radius: 10px;
                text-align: left;
                white-space: normal;
            }
        }

        @media (max-width: 576px) {
            h1 {
                font-size: 36px;
                line-height: 1.08;
                letter-spacing: -0.8px;
                margin-bottom: 10px;
            }

            .subtitle {
                font-size: 16px;
                line-height: 1.5;
                padding: 0 12px;
            }

            .header-section {
                margin-bottom: 32px;
                padding-top: 38px;
            }
        }

        /* ── Paginación ─────────────────────────────────────────────── */
        #pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 52px;
            padding-bottom: 12px;
        }

        .page-btn {
            padding: 10px 16px;
            min-width: 44px;
            border-radius: 11px;
            border: 1px solid rgba(255, 255, 255, .15);
            background: rgba(255, 255, 255, .08);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s ease;
            text-align: center;
            font-family: inherit;
        }

        .page-btn:hover:not(:disabled):not(.ellipsis) {
            background: rgba(255, 255, 255, .18);
            border-color: rgba(255, 255, 255, .35);
            transform: translateY(-2px);
        }

        .page-btn.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border-color: transparent;
            box-shadow: 0 4px 16px rgba(43, 144, 227, .45);
        }

        .page-btn:disabled {
            opacity: .3;
            cursor: default;
        }

        .page-btn.ellipsis {
            background: transparent;
            border-color: transparent;
            cursor: default;
        }

        .prev-btn, .next-btn {
            padding: 10px 20px;
        }

        @media (max-width: 576px) {
            .prev-btn, .next-btn { padding: 10px 14px; font-size: 13px; }
            .page-btn { min-width: 38px; padding: 9px 12px; }
        }
    </style>
</head>

<body>
    <canvas id="network-bg"></canvas>

    <div class="news-page">

        <div class="header-section">
            <h1>Actualidad al Día</h1>
            <p class="subtitle">Tu fuente diaria de noticias resumidas y contenido personalizado</p>
        </div>

        <div class="category-filter">
            <button class="category-filter-toggle" id="categoryFilterToggle" type="button" aria-expanded="false">
                <span class="filter-label">Categoría:</span>
                <span class="filter-current" id="filterCurrent">Todo</span>
                <span class="filter-arrow">▾</span>
            </button>

            <div class="category-tabs" id="categoryTabs">
                <div class="tab active">Todo</div>
                <div class="tab">Actualidad</div>
                <div class="tab">Casos de Éxito</div>
                <div class="tab">Medios de comunicación</div>
                <div class="tab">RGPD</div>
                <div class="tab">RSC</div>
                <div class="tab">Seguridad Informática</div>
                <div class="tab">Servicios</div>
                <div class="tab">Servicios Web</div>
                <div class="tab">Soluciones IT</div>
            </div>
        </div>

        <div class="container">
            <div class="news-grid news-from-shortcode">
                [actualidad_noticias]
            </div>
        </div>

        <div id="pagination"></div>
        <script>
            /* ── Filtro de categorías + Paginación unificados ────────────── */
            function normalizeCategory(str) {
                return str.trim().toLowerCase()
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                    .replace(/\s+/g, '-');
            }

            document.addEventListener('DOMContentLoaded', () => {

                const ITEMS_PER_PAGE = 9;
                let activeCat   = 'todo';
                let currentPage = 1;

                const tabs          = document.querySelectorAll('.tab');
                const filterWrap    = document.querySelector('.category-filter');
                const filterToggle  = document.getElementById('categoryFilterToggle');
                const filterCurrent = document.getElementById('filterCurrent');

                /* --- Devuelve las cards que coinciden con la categoría activa --- */
                function matchingCards() {
                    return Array.from(document.querySelectorAll('.news-ultra-card'))
                        .filter(card => {
                            if (activeCat === 'todo') return true;
                            const cats = (card.dataset.category || '')
                                .split(',').map(c => normalizeCategory(c));
                            return cats.includes(activeCat);
                        });
                }

                /* --- Muestra la página indicada -------------------------------- */
                function showPage(page) {
                    currentPage = page;
                    const filtered = matchingCards();
                    const total    = Math.ceil(filtered.length / ITEMS_PER_PAGE);
                    const start    = (page - 1) * ITEMS_PER_PAGE;
                    const visible  = new Set(filtered.slice(start, start + ITEMS_PER_PAGE));

                    document.querySelectorAll('.news-ultra-card').forEach(c => {
                        const show = visible.has(c);
                        c.style.display = show ? '' : 'none';
                        if (show) c.style.animation = 'fadeInUp .4s ease both';
                    });

                    renderPagination(page, total);
                }

                /* --- Renderiza los botones de paginación ----------------------- */
                function renderPagination(current, total) {
                    const el = document.getElementById('pagination');
                    if (!el) return;
                    if (total <= 1) { el.innerHTML = ''; return; }

                    /* Genera la secuencia de páginas con ellipsis */
                    const seq = [];
                    for (let i = 1; i <= total; i++) {
                        if (i === 1 || i === total ||
                            (i >= current - 2 && i <= current + 2)) {
                            seq.push(i);
                        } else if (seq[seq.length - 1] !== '…') {
                            seq.push('…');
                        }
                    }

                    let html = `<button class="page-btn prev-btn"
                                    ${current === 1 ? 'disabled' : ''}
                                    data-page="${current - 1}">‹ Anterior</button>`;

                    seq.forEach(p => {
                        if (p === '…') {
                            html += `<span class="page-btn ellipsis">…</span>`;
                        } else {
                            html += `<button class="page-btn ${p === current ? 'active' : ''}"
                                         data-page="${p}">${p}</button>`;
                        }
                    });

                    html += `<button class="page-btn next-btn"
                                 ${current === total ? 'disabled' : ''}
                                 data-page="${current + 1}">Siguiente ›</button>`;

                    el.innerHTML = html;

                    el.querySelectorAll('button[data-page]').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const p = parseInt(btn.dataset.page);
                            if (!isNaN(p)) {
                                showPage(p);
                                window.scrollTo({ top: 0, behavior: 'smooth' });
                            }
                        });
                    });
                }

                /* --- Tabs de categoría ---------------------------------------- */
                tabs.forEach(tab => {
                    tab.addEventListener('click', () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');

                        const text = tab.textContent.trim();
                        activeCat   = normalizeCategory(text);
                        currentPage = 1;

                        if (filterCurrent) filterCurrent.textContent = text;

                        if (window.innerWidth <= 576 && filterWrap) {
                            filterWrap.classList.remove('open');
                            filterToggle?.setAttribute('aria-expanded', 'false');
                        }

                        showPage(1);
                    });
                });

                /* --- Menú móvil ------------------------------------------------ */
                if (filterToggle) {
                    filterToggle.addEventListener('click', () => {
                        filterWrap.classList.toggle('open');
                        filterToggle.setAttribute('aria-expanded',
                            filterWrap.classList.contains('open') ? 'true' : 'false');
                    });
                    document.addEventListener('click', e => {
                        if (!filterWrap.contains(e.target)) {
                            filterWrap.classList.remove('open');
                            filterToggle.setAttribute('aria-expanded', 'false');
                        }
                    });
                }

                /* --- Inicializar ---------------------------------------------- */
                showPage(1);
            });
        </script>


        <script>
            const canvas = document.getElementById('network-bg');
            const ctx = canvas.getContext('2d');
            let width, height;
            let nodes = [];

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                createNodes(Math.floor((width * height) / 10000));
            }

            window.addEventListener('resize', resize);
            resize();

            function createNodes(count) {
                nodes = [];
                for (let i = 0; i < count; i++) {
                    nodes.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5
                    });
                }
            }

            function draw() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';

                nodes.forEach((n, i) => {
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, 2, 0, 2 * Math.PI);
                    ctx.fill();

                    for (let j = i + 1; j < nodes.length; j++) {
                        const n2 = nodes[j];
                        const dx = n.x - n2.x;
                        const dy = n.y - n2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(n.x, n.y);
                            ctx.lineTo(n2.x, n2.y);
                            ctx.stroke();
                        }
                    }

                    n.x += n.vx;
                    n.y += n.vy;

                    if (n.x < 0 || n.x > width) n.vx *= -1;
                    if (n.y < 0 || n.y > height) n.vy *= -1;
                });

                requestAnimationFrame(draw);
            }

            draw();
        </script>
    </div>
</body>

</html>
